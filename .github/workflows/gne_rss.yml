name: Generate GNE Library RSS Feed

on:
  schedule:
    # 매일 한국 시간(KST) 오전 9시에 실행 (UTC 기준 0시)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 feedgen pytz

    - name: Run GNE RSS Generator Script
      run: python generate_gne_rss.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add gne_rss.xml
        
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update GNE Library RSS feed" && git push)
