name: Generate NLK Recruitment RSS Feed

on:
  schedule:
    # 매일 한국 시간(KST) 오전 9시에 실행 (UTC 기준 0시)
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동으로 워크플로우를 실행할 수 있는 버튼 활성화

permissions:
  contents: write # 봇이 레포지토리에 커밋할 수 있는 권한 부여

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 feedgen pytz

    - name: Run RSS Generator Script
      run: python generate_rss.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add rss.xml
        
        # 변경사항이 있을 때만 커밋하고 푸시 (없으면 무시)
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update RSS feed" && git push)
